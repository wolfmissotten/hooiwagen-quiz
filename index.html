<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opiliones of Belgium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Consolas is een lokaal geïnstalleerd lettertype (Windows/Office); DM Mono is de
     web-fallback voor wie het niet heeft, zodat het er overal consistent monospace uitziet. -->
<style>
  :root {
    --mono: Consolas, 'DM Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;
    --bg:      #e9eaec;
    --bg2:     #dcdee1;
    --bg3:     #b9bdc3;
    --paper:   #f7f8f9;
    --ink:     #17191c;
    --ink2:    #454951;
    --ink3:    #6f747d;
    --accent:  #33373d;
    --accent2: #565c65;
    --good:    #157a3d;
    --good-bg: #cdf0da;
    --bad:     #c22a1e;
    --bad-bg:  #fadad2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--mono);
    font-size: 14px;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  header {
    padding: 1.5rem 2rem 1.1rem;
    border-bottom: 2px solid var(--ink);
    position: relative;
    z-index: 1;
  }

  .header-inner {
    max-width: 640px;
    margin: 0 auto;
  }

  h1 {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 1.15rem;
    letter-spacing: 0.01em;
  }

  h1 .h1-sub {
    font-weight: 400;
    color: var(--accent2);
  }

  main {
    flex: 1;
    padding: 2rem;
    position: relative;
    z-index: 1;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
  }

  /* Stats: platte regel, geen badges */
  .stats {
    display: flex;
    gap: 1.25rem;
    margin-bottom: 1.5rem;
    align-items: center;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--bg3);
  }

  .stat-pill {
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: none;
    padding: 0;
    border-radius: 0;
    background: none;
    color: var(--ink2);
    white-space: nowrap;
  }

  .stat-pill.good { color: var(--good); }
  .stat-pill.bad  { color: var(--bad); }

  .progress-track {
    flex: 1;
    height: 1px;
    background: var(--bg3);
    border-radius: 0;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--ink);
    border-radius: 0;
    transition: width 0.4s ease;
  }

  /* Flashcard: als een determinatiekaartje */
  .flashcard {
    background: var(--paper);
    border: 1px solid var(--ink);
    border-radius: 0;
    overflow: hidden;
    margin-bottom: 1rem;
    box-shadow: none;
  }

  .card-image-area {
    position: relative;
    width: 100%;
    height: 340px;
    background: var(--bg2);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--ink);
  }

  .card-image-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .no-photo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    color: var(--ink3);
    opacity: 0.55;
  }

  .no-photo svg { width: 44px; height: 44px; }
  .no-photo p { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }

  .card-counter, .retry-tag {
    position: absolute;
    top: 10px;
    font-size: 10px;
    letter-spacing: 0.06em;
    padding: 3px 8px;
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--ink);
    border-radius: 0;
    text-transform: uppercase;
  }

  .card-counter { right: 10px; }
  .retry-tag    { left: 10px; }

  .card-body { padding: 1.5rem; }

  .card-question {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 1rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px dashed var(--bg3);
  }

  /* Options */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 1rem;
  }

  .opt {
    font-family: var(--mono);
    font-weight: 400;
    font-size: 13px;
    font-style: normal;
    padding: 10px 12px;
    text-align: left;
    background: var(--bg);
    border: 1px solid var(--ink3);
    border-radius: 0;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
    line-height: 1.3;
  }

  .opt:hover:not(:disabled) {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }

  .opt.correct { background: var(--good-bg); border-color: var(--good); color: var(--good); }
  .opt.wrong   { background: var(--bad-bg);  border-color: var(--bad);  color: var(--bad); }
  .opt:disabled { cursor: default; }

  .dontknow-btn {
    display: block;
    width: 100%;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.05em;
    padding: 9px 12px;
    margin-bottom: 1rem;
    background: none;
    border: 1px dashed var(--ink3);
    border-radius: 0;
    color: var(--ink3);
    cursor: pointer;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
  }

  .dontknow-btn:hover:not(:disabled) {
    background: var(--bg2);
    border-color: var(--ink);
    color: var(--ink);
  }

  .dontknow-btn:disabled { cursor: default; opacity: 0.4; }

  /* Feedback */
  .feedback {
    display: none;
    padding: 0.9rem 1.1rem;
    border-radius: 0;
    font-size: 12.5px;
    line-height: 1.7;
    margin-bottom: 1rem;
    border: 1px solid var(--bg3);
    border-left: 3px solid var(--ink3);
  }

  .feedback.show { display: block; }
  .feedback.correct { background: var(--good-bg); border-left-color: var(--good); color: var(--good); }
  .feedback.wrong   { background: var(--bad-bg);  border-left-color: var(--bad);  color: var(--bad); }

  .feedback strong {
    font-family: var(--mono);
    font-style: normal;
    font-weight: 600;
    font-size: 13px;
    display: block;
    margin-bottom: 6px;
    letter-spacing: 0.01em;
  }

  .feedback strong::before {
    content: '\2192  ';
    color: var(--ink3);
    font-weight: 400;
  }

  .detail-row {
    display: flex;
    gap: 1.25rem;
    margin-top: 8px;
    font-size: 11px;
    opacity: 0.75;
    flex-wrap: wrap;
    letter-spacing: 0.02em;
  }

  .next-row { display: flex; justify-content: flex-end; }

  .next-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 9px 18px;
    background: var(--ink);
    color: var(--bg);
    border: 1px solid var(--ink);
    border-radius: 0;
    cursor: pointer;
    display: none;
    transition: opacity 0.15s;
  }

  .next-btn:hover { opacity: 0.8; }

  /* Done screen */
  .done-screen {
    display: none;
    text-align: center;
    padding: 3rem 2rem;
    background: var(--paper);
    border: 1px solid var(--ink);
    border-radius: 0;
    box-shadow: none;
  }

  .done-screen.show { display: block; }

  .done-score {
    font-family: var(--mono);
    font-size: 4rem;
    font-weight: 600;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 0.25rem;
  }

  .done-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 1.5rem;
  }

  .restart-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 11px 26px;
    background: var(--ink);
    color: var(--bg);
    border: 1px solid var(--ink);
    border-radius: 0;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .restart-btn:hover { opacity: 0.8; }

  .switch-group-row { margin-top: 1.25rem; }

  .switch-group-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    background: none;
    border: none;
    color: var(--ink3);
    text-decoration: underline;
    text-underline-offset: 3px;
    cursor: pointer;
  }

  .switch-group-btn:hover { color: var(--ink); }

  /* Groepskeuze */
  .select-screen {
    text-align: center;
    padding: 2.5rem 2rem;
    background: var(--paper);
    border: 1px solid var(--ink);
    border-radius: 0;
  }

  .select-title {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 1.5rem;
  }

  .select-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .select-btn {
    font-family: var(--mono);
    font-size: 14px;
    padding: 14px 16px;
    background: var(--bg);
    border: 1px solid var(--ink3);
    border-radius: 0;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
  }

  .select-btn span {
    display: block;
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--ink3);
    margin-top: 3px;
  }

  .select-btn:hover {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }

  .select-btn:hover span { color: var(--bg2); }

  /* Error / loading */
  .status-msg {
    text-align: center;
    padding: 3rem;
    color: var(--ink3);
    font-size: 13px;
    line-height: 1.8;
  }

  .status-msg strong {
    color: var(--ink2);
    display: block;
    margin-bottom: 0.5rem;
    font-size: 14px;
    font-family: var(--mono);
    font-style: normal;
    font-weight: 600;
  }

  @media (max-width: 520px) {
    .options { grid-template-columns: 1fr; }
    .card-image-area { height: 240px; }
    .done-score { font-size: 3.2rem; }
    h1 { font-size: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>Opiliones of Belgium <span
  </div>
</header>

<main>
  <div class="container">

    <div class="stats">
      <span class="stat-pill good" id="s-correct">✓ 0</span>
      <span class="stat-pill bad"  id="s-wrong">✗ 0</span>
      <div class="progress-track">
        <div class="progress-fill" id="prog" style="width:0%"></div>
      </div>
      <span class="stat-pill" id="s-progress">0 / 0</span>
    </div>

    <div id="status" class="status-msg">
      <strong>Loading cards…</strong>
    </div>

    <div class="select-screen" id="select-screen" style="display:none">
      <div class="select-title">Which group do you want to practice?</div>
      <div class="select-options">
        <button class="select-btn" onclick="startGroup('phalangiidae')">
          True harvestmen<span>family Phalangiidae</span>
        </button>
        <button class="select-btn" onclick="startGroup('rest')">
          Other families<span>
        </button>
        <button class="select-btn" onclick="startGroup('alles')">
          Random mix<span>all families combined</span>
        </button>
      </div>
    </div>

    <div class="flashcard" id="flashcard" style="display:none">
      <div class="card-image-area" id="img-area"></div>
      <div class="card-body">
        <div class="options" id="options"></div>
        <button class="dontknow-btn" id="dontknow-btn">I don't know</button>
        <div class="feedback" id="feedback"></div>
        <div class="next-row">
          <button class="next-btn" id="next-btn">Next →</button>
        </div>
      </div>
    </div>

    <div class="done-screen" id="done-screen">
      <div class="done-score" id="done-score">0</div>
      <div class="done-label">correct out of <span id="done-total">0</span></div>
      <button class="restart-btn" onclick="startLearning()">Start over</button>
      <div class="switch-group-row">
        <button class="switch-group-btn" onclick="backToGroupSelect()">Choose another group</button>
      </div>
    </div>

  </div>
</main>

<script>
let cards = [];       // alle soorten, ongefilterd
let activeCards = []; // de gekozen groep waaruit deze sessie geput wordt
let deck  = [];
let idx = 0, correct = 0, wrong = 0;
let answered = false;

// Kaarten die fout beantwoord zijn, komen aan het einde van de sessie
// nog een keer terug (in een nieuwe, geschudde herkansingsronde) totdat
// alles minstens één keer goed is beantwoord.
let wrongCards = [];
let firstPassLength = 0;

// Elke soort heeft een map met genummerde foto's (fotos/<slug>/1.jpg, 2.jpg, ...).
// We proberen gewoon oplopende nummers tot er eentje niet bestaat (geen aparte
// lijst per soort nodig), en tonen per kaart telkens één willekeurige foto
// uit de map die gevonden is.
const MAX_PHOTOS_PER_CARD = 12;
let currentCard = null;
let currentPhotos = [];
let currentPhotoIdx = 0;

// Onthoudt per soort welke foto het laatst getoond is, zodat een herkansing
// niet toevallig weer diezelfde foto van de eerste ronde toont.
let lastPhotoShown = new Map();

function checkImage(url) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload  = () => resolve(url);
    img.onerror = () => resolve(null);
    img.src = url;
  });
}

// Kiest een willekeurige foto-index, maar vermijdt (indien mogelijk) de
// vorige foto die voor deze soort getoond werd.
function pickPhotoIndex(photos, excludeUrl) {
  if (!photos.length) return 0;
  const candidates = excludeUrl
    ? photos.map((_, i) => i).filter(i => photos[i] !== excludeUrl)
    : photos.map((_, i) => i);
  const pool = candidates.length ? candidates : photos.map((_, i) => i);
  return pool[Math.floor(Math.random() * pool.length)];
}

async function loadPhotos(folder) {
  if (!folder) return [];
  const checks = [];
  for (let i = 1; i <= MAX_PHOTOS_PER_CARD; i++) {
    checks.push(checkImage(folder + i + '.jpg'));
  }
  const results = await Promise.all(checks);
  return results.filter(Boolean);
}

async function loadCards() {
  try {
    // Cache-busting: zonder dit blijven browsers (en soms GitHub Pages' CDN)
    // een oude cards.json tonen nadat je nieuwe soorten hebt toegevoegd.
    const res = await fetch('cards.json?v=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    cards = await res.json();
    if (!cards.length) throw new Error('No cards found');
    document.getElementById('status').style.display = 'none';
    document.getElementById('select-screen').style.display = 'block';
  } catch (e) {
    document.getElementById('status').innerHTML =
      '<strong>cards.json not found</strong>' +
      'Make sure <code>cards.json</code> is next to <code>index.html</code> in your repo.<br>' +
      'Error: ' + e.message;
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// group: 'phalangiidae' (echte hooiwagens), 'rest' (overige families) of 'alles'
function startGroup(group) {
  if (group === 'phalangiidae') {
    activeCards = cards.filter(c => c.family === 'Phalangiidae');
  } else if (group === 'rest') {
    activeCards = cards.filter(c => c.family !== 'Phalangiidae');
  } else {
    activeCards = cards;
  }
  document.getElementById('select-screen').style.display = 'none';
  startLearning();
}

function backToGroupSelect() {
  document.getElementById('done-screen').classList.remove('show');
  document.getElementById('flashcard').style.display = 'none';
  document.getElementById('select-screen').style.display = 'block';
}

function startLearning() {
  deck = shuffle(activeCards);
  idx = 0; correct = 0; wrong = 0; answered = false;
  wrongCards = [];
  lastPhotoShown = new Map();
  firstPassLength = deck.length;
  document.getElementById('status').style.display = 'none';
  document.getElementById('select-screen').style.display = 'none';
  document.getElementById('done-screen').classList.remove('show');
  document.getElementById('flashcard').style.display = 'block';
  updateStats();
  showCard();
}

function updateStats() {
  document.getElementById('s-correct').textContent  = '✓ ' + correct;
  document.getElementById('s-wrong').textContent    = '✗ ' + wrong;
  document.getElementById('s-progress').textContent = idx + ' / ' + deck.length;
  document.getElementById('prog').style.width = Math.round((idx / deck.length) * 100) + '%';
}

const NO_PHOTO_SVG = `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="24" cy="24" r="9" stroke="currentColor" stroke-width="1.5"/>
  <line x1="24" y1="15" x2="12" y2="6"  stroke="currentColor" stroke-width="1.5"/>
  <line x1="24" y1="15" x2="24" y2="4"  stroke="currentColor" stroke-width="1.5"/>
  <line x1="24" y1="15" x2="36" y2="6"  stroke="currentColor" stroke-width="1.5"/>
  <line x1="24" y1="33" x2="12" y2="42" stroke="currentColor" stroke-width="1.5"/>
  <line x1="24" y1="33" x2="24" y2="44" stroke="currentColor" stroke-width="1.5"/>
  <line x1="24" y1="33" x2="36" y2="42" stroke="currentColor" stroke-width="1.5"/>
  <line x1="15" y1="24" x2="4"  y2="19" stroke="currentColor" stroke-width="1.5"/>
  <line x1="15" y1="24" x2="4"  y2="29" stroke="currentColor" stroke-width="1.5"/>
  <line x1="33" y1="24" x2="44" y2="19" stroke="currentColor" stroke-width="1.5"/>
  <line x1="33" y1="24" x2="44" y2="29" stroke="currentColor" stroke-width="1.5"/>
</svg>`;

function photoTag() {
  const retry = idx >= firstPassLength ? '<span class="retry-tag">Retry</span>' : '';
  return `<span class="card-counter">${idx + 1} / ${deck.length}</span>${retry}`;
}

function renderPhotoFrame() {
  const imgArea = document.getElementById('img-area');
  const tag = photoTag();

  function showNoPhoto(message) {
    imgArea.innerHTML = `<div class="no-photo">${NO_PHOTO_SVG}<p>${message}</p></div>${tag}`;
  }

  if (!currentPhotos.length) {
    showNoPhoto('No photo');
    return;
  }

  // Bouw de <img> via de DOM op (niet als HTML-string), zodat de SVG met
  // dubbele aanhalingstekens in het onerror-attribuut niet voor problemen zorgt.
  imgArea.innerHTML = tag;
  const img = document.createElement('img');
  img.alt = currentCard.name;
  img.onerror = () => showNoPhoto('Photo not found');
  img.src = currentPhotos[currentPhotoIdx];
  imgArea.prepend(img);
}

async function showCard() {
  if (idx >= deck.length) {
    if (wrongCards.length) {
      // Herkansingsronde: alle fout beantwoorde kaarten komen geschud terug.
      deck = deck.concat(shuffle(wrongCards));
      wrongCards = [];
    } else {
      showDone();
      return;
    }
  }
  answered = false;

  const card = deck[idx];
  currentCard = card;

  // Foto's uit fotos/<slug>/1.jpg, 2.jpg, ... ophalen, telkens één willekeurig kiezen.
  // Bij een herkansing wordt de foto van de vorige keer (indien er meerdere zijn)
  // uitgesloten, zodat je niet twee keer dezelfde foto van deze soort krijgt.
  const imgArea = document.getElementById('img-area');
  imgArea.innerHTML = photoTag();
  currentPhotos = await loadPhotos(card.photoFolder || card.photo);
  currentPhotoIdx = pickPhotoIndex(currentPhotos, lastPhotoShown.get(card.name));
  if (currentCard === card) {
    if (currentPhotos.length) lastPhotoShown.set(card.name, currentPhotos[currentPhotoIdx]);
    renderPhotoFrame(); // negeer als ondertussen al doorgeklikt is
  }

  // Options (afleiders komen uit dezelfde gekozen groep)
  const others  = shuffle(activeCards.filter(c => c.name !== card.name)).slice(0, 5);
  const choices = shuffle([card, ...others]);
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  choices.forEach(ch => {
    const b = document.createElement('button');
    b.className = 'opt';
    b.textContent = ch.name;
    b.dataset.name = ch.name;
    b.onclick = () => answer(ch.name, card, b);
    opts.appendChild(b);
  });

  const dontknowBtn = document.getElementById('dontknow-btn');
  dontknowBtn.disabled = false;
  dontknowBtn.onclick = () => answer(null, card, null);

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';
  document.getElementById('next-btn').style.display = 'none';
}

function answer(chosen, card, btn) {
  if (answered) return;
  answered = true;

  document.querySelectorAll('.opt').forEach(b => {
    b.disabled = true;
    if (b.dataset.name === card.name) b.classList.add('correct');
  });
  document.getElementById('dontknow-btn').disabled = true;

  const fb = document.getElementById('feedback');
  if (chosen === card.name) {
    correct++;
    fb.className = 'feedback correct show';
  } else {
    if (btn) btn.classList.add('wrong'); // geen knop bij 'Ik weet het niet'
    wrong++;
    wrongCards.push(card);
    fb.className = 'feedback wrong show';
  }

  fb.innerHTML = `<strong>${card.nameFull || card.name}</strong>
    ${card.notes || ''}
    <div class="detail-row">
      ${card.rarity  ? '<span>Rarity: ' + card.rarity  + '</span>' : ''}
      ${card.habitat ? '<span>Habitat: ' + card.habitat + '</span>' : ''}
      ${card.season  ? '<span>Season: '  + card.season  + '</span>' : ''}
    </div>`;

  idx++;
  updateStats();
  document.getElementById('next-btn').style.display = 'inline-block';
  document.getElementById('next-btn').onclick = showCard;
}

function showDone() {
  document.getElementById('flashcard').style.display = 'none';
  document.getElementById('done-screen').classList.add('show');
  document.getElementById('done-score').textContent = correct;
  document.getElementById('done-total').textContent = deck.length;
}

loadCards();
</script>
</body>
</html>
